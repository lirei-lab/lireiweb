<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2b45"/>
      <stop offset="1" stop-color="#14456e"/>
    </linearGradient>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#2fbf83"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- bidirectional transactive links -->
  <g stroke="#2fbf83" stroke-width="2.5" stroke-dasharray="7 7" opacity="0.85" fill="none">
    <path d="M400 200 L170 110" marker-start="url(#ah)" marker-end="url(#ah)"/>
    <path d="M400 200 L630 110" marker-start="url(#ah)" marker-end="url(#ah)"/>
    <path d="M400 200 L150 300" marker-start="url(#ah)" marker-end="url(#ah)"/>
    <path d="M400 200 L400 330" marker-start="url(#ah)" marker-end="url(#ah)"/>
    <path d="M400 200 L650 300" marker-start="url(#ah)" marker-end="url(#ah)"/>
  </g>

  <!-- central market hub -->
  <circle cx="400" cy="200" r="52" fill="#0e8a5f"/>
  <circle cx="400" cy="200" r="52" fill="none" stroke="#2fbf83" stroke-width="3" opacity="0.6"/>
  <g stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M375 190h44M410 178l12 12-12 12"/>
    <path d="M425 214h-44M392 202l-12 12 12 12"/>
  </g>

  <!-- house -->
  <g transform="translate(120,70)" stroke="#e8f0f7" stroke-width="4" fill="none" stroke-linejoin="round">
    <path d="M10 45L50 12L90 45"/>
    <path d="M22 42v40h56V42"/>
    <path d="M42 82V60h16v22"/>
  </g>

  <!-- building -->
  <g transform="translate(585,55)" stroke="#e8f0f7" stroke-width="4" fill="none">
    <rect x="10" y="10" width="70" height="90" rx="3"/>
    <path d="M28 30h12M50 30h12M28 52h12M50 52h12M28 74h12M50 74h12"/>
  </g>

  <!-- EV -->
  <g transform="translate(95,270)" stroke="#e8f0f7" stroke-width="4" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <path d="M12 50h86l-10-22a10 10 0 0 0-9-6H38a10 10 0 0 0-9 6z"/>
    <path d="M6 50h100v14H6z"/>
    <circle cx="32" cy="68" r="8"/>
    <circle cx="80" cy="68" r="8"/>
  </g>
  <path d="M155 240l-10 18h9l-7 16 16-20h-9l8-14z" fill="#2fbf83"/>

  <!-- battery -->
  <g transform="translate(355,335)" stroke="#e8f0f7" stroke-width="4" fill="none">
    <rect x="6" y="8" width="76" height="38" rx="5"/>
    <path d="M86 20v14"/>
    <path d="M20 18v18M34 18v18M48 18v18" stroke="#2fbf83"/>
  </g>

  <!-- solar -->
  <g transform="translate(610,265)" stroke="#e8f0f7" stroke-width="4" fill="none" stroke-linejoin="round">
    <path d="M14 46L30 12h56L70 46z"/>
    <path d="M26 24h52M20 35h52M46 12L38 46"/>
    <path d="M42 46v16M30 62h24"/>
  </g>
</svg>
