<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d2b45"/>
      <stop offset="1" stop-color="#14456e"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2fbf83" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2fbf83" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#sky)"/>

  <!-- snow ground -->
  <path d="M0 330 Q200 312 420 330 T800 326 V400 H0 Z" fill="#e8f0f7" opacity="0.92"/>

  <!-- snowflakes -->
  <g stroke="#e8f0f7" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
    <g transform="translate(120,80)"><path d="M0 -14V14M-12 -7L12 7M-12 7L12 -7"/></g>
    <g transform="translate(690,60) scale(0.8)"><path d="M0 -14V14M-12 -7L12 7M-12 7L12 -7"/></g>
    <g transform="translate(620,150) scale(0.55)"><path d="M0 -14V14M-12 -7L12 7M-12 7L12 -7"/></g>
    <g transform="translate(75,190) scale(0.6)"><path d="M0 -14V14M-12 -7L12 7M-12 7L12 -7"/></g>
  </g>

  <!-- sun low on horizon -->
  <circle cx="705" cy="255" r="26" fill="#2fbf83" opacity="0.55"/>
  <circle cx="705" cy="255" r="16" fill="#2fbf83" opacity="0.8"/>

  <!-- greenhouse -->
  <g>
    <path d="M215 335V205L400 120L585 205V335Z" fill="url(#glass)" stroke="#e8f0f7" stroke-width="5" stroke-linejoin="round"/>
    <!-- structure lines -->
    <g stroke="#e8f0f7" stroke-width="2.5" opacity="0.75">
      <path d="M270 335V180M330 335V152M400 335V120M470 335V152M530 335V180"/>
      <path d="M215 260h370M215 300h370"/>
    </g>
    <!-- door -->
    <path d="M378 335V265h44v70" fill="none" stroke="#e8f0f7" stroke-width="4"/>
  </g>

  <!-- plants inside -->
  <g stroke="#2fbf83" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M255 330v-22M255 316c-8-4-12-10-12-18 8 2 12 8 12 18zM255 322c8-4 12-10 12-18-8 2-12 8-12 18z"/>
    <path d="M310 330v-26M310 312c-9-4-13-11-13-20 9 2 13 9 13 20zM310 318c9-4 13-11 13-20-9 2-13 9-13 20z"/>
    <path d="M490 330v-26M490 312c-9-4-13-11-13-20 9 2 13 9 13 20zM490 318c9-4 13-11 13-20-9 2-13 9-13 20z"/>
    <path d="M545 330v-22M545 316c-8-4-12-10-12-18 8 2 12 8 12 18zM545 322c8-4 12-10 12-18-8 2-12 8-12 18z"/>
  </g>

  <!-- temperature/energy dial above door -->
  <circle cx="400" cy="225" r="17" fill="none" stroke="#2fbf83" stroke-width="4"/>
  <path d="M400 225L409 216" stroke="#2fbf83" stroke-width="4" stroke-linecap="round"/>
</svg>
